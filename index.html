  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f1510;
      color: #c8d8c8;
      min-height: 100vh;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2a3a2a; border-radius: 2px; }

    /* ── Layout shells ── */
    #app { min-height: 100vh; }

    .screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 100px;
      position: relative;
    }

    /* ── Progress bar ── */
    #progress-track {
      position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: #1a2a1a; z-index: 100;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      transition: width .5s ease, background-color .5s ease;
    }
    #step-counter {
      position: fixed; top: 16px; right: 20px;
      font-size: 11px; color: #3a5a3a; letter-spacing: .1em;
    }

    /* ── Questionnaire card ── */
    .q-card {
      width: 100%; max-width: 520px;
      background: rgba(20,28,20,0.85);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 36px 32px;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      transition: opacity .32s ease, transform .32s ease;
    }
    .q-category {
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      margin-bottom: 24px;
      transition: color .4s;
    }
    .q-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-weight: 400;
      color: #dde8dd; line-height: 1.4;
      margin-bottom: 8px;
    }
    .q-sub {
      font-size: 13px; color: #5a7a5a;
      line-height: 1.6; margin-bottom: 24px;
      font-weight: 300;
    }

    /* ── Text input ── */
    .text-input {
      width: 100%; background: transparent;
      border: 1px solid #2e3e2e;
      border-radius: 10px; padding: 13px 16px;
      font-size: 15px; color: #e0e8e0;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300; margin-top: 20px;
      transition: border-color .2s;
      outline: none;
    }
    .text-input:focus { border-color: var(--ac, #7aaa7a); }

    /* ── Option buttons ── */
    .opt-list { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
    .opt-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; cursor: pointer;
      text-align: left;
      transition: background .18s, border-color .18s;
      font-family: 'DM Sans', sans-serif;
      color: #b0c0b0; font-size: 13px; font-weight: 300;
    }
    .opt-btn:hover { background: rgba(255,255,255,0.06); border-color: var(--ac,#7aaa7a); }
    .opt-btn.selected { background: rgba(255,255,255,0.1); border-color: var(--ac,#7aaa7a); }
    .opt-icon { width: 22px; text-align: center; flex-shrink: 0; }
    .checkbox {
      width: 18px; height: 18px; border-radius: 4px;
      border: 1px solid #2e3e2e;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s;
      background: transparent;
    }
    .checkbox.checked {
      border-color: var(--ac,#7aaa7a);
      background: var(--ac,#7aaa7a);
    }
    .checkbox.checked::after {
      content: '✓'; color: #111; font-size: 11px; font-weight: 700;
    }

    /* ── Navigation ── */
    .nav {
      display: flex; align-items: center;
      justify-content: space-between;
      width: 100%; max-width: 520px;
      margin-top: 20px; gap: 12px;
      transition: opacity .32s;
    }
    .back-btn {
      background: transparent; border: none;
      color: #3a5a3a; font-size: 13px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300; letter-spacing: .05em;
      padding: 10px 0; transition: opacity .2s;
    }
    .back-btn:hover { opacity: .6; }
    .next-btn {
      padding: 12px 26px; border: none;
      border-radius: 50px; font-size: 13px;
      font-weight: 500; color: #0f1510;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      letter-spacing: .06em;
      transition: opacity .2s, transform .2s;
      margin-left: auto;
    }
    .next-btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    .next-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── Botanical decoration ── */
    .botanical {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; color: #243024; letter-spacing: .4em;
      pointer-events: none;
    }

    /* ── Results ── */
    .results-wrap {
      max-width: 560px; width: 100%;
      margin: 0 auto; padding: 60px 20px 80px;
    }
    .results-header { text-align: center; margin-bottom: 48px; }
    .results-ornament {
      font-size: 28px; margin-bottom: 20px;
      letter-spacing: .2em; color: #4a6a4a;
    }
    .results-title {
      font-family: 'Playfair Display', serif;
      font-size: 30px; font-weight: 400;
      color: #e8ede8; line-height: 1.3; margin-bottom: 12px;
    }
    .results-sub {
      font-size: 14px; color: #6a7a6a; line-height: 1.7;
      max-width: 420px; margin: 0 auto;
      font-weight: 300;
    }
    .section-label {
      font-size: 11px; font-weight: 500;
      letter-spacing: .18em; text-transform: uppercase;
      color: #4a6a4a; margin-bottom: 20px;
    }

    /* ── Drug warning ── */
    .drug-warning {
      background: rgba(200,160,96,.1);
      border: 1px solid rgba(200,160,96,.25);
      border-radius: 12px; padding: 14px 18px;
      margin-bottom: 24px; font-size: 13px;
      color: #c8a060; line-height: 1.6;
    }

    /* ── Herb card ── */
    .herb-card {
      background: rgba(20,28,20,.75);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px; padding: 20px;
      margin-bottom: 12px;
      transition: border-color .3s;
      backdrop-filter: blur(8px);
    }
    .herb-card.open { border-color: var(--herb-colour); }
    .herb-card-header {
      display: flex; align-items: flex-start;
      gap: 16px; cursor: pointer;
    }
    .herb-symbol {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      color: var(--herb-colour);
      border-color: color-mix(in srgb, var(--herb-colour) 30%, transparent);
    }
    .herb-meta { flex: 1; min-width: 0; }
    .herb-badges { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .rank-badge {
      font-size: 10px; font-weight: 500;
      letter-spacing: .12em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px;
    }
    .cat-badge { font-size: 10px; color: #3a5a3a; letter-spacing: .08em; }
    .herb-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 400;
      color: #dde8dd; margin-bottom: 2px;
    }
    .herb-botanical {
      font-size: 11px; color: #4a6a4a;
      font-style: italic; margin-bottom: 4px;
    }
    .herb-tagline { font-size: 12px; color: #6a8a6a; font-weight: 300; }
    .herb-chevron {
      color: #3a5a3a; font-size: 18px; flex-shrink: 0;
      transition: transform .3s; user-select: none;
    }
    .herb-card.open .herb-chevron { transform: rotate(180deg); }

    /* ── Expanded herb details ── */
    .herb-expanded { margin-top: 16px; }
    .herb-divider { height: 1px; background: rgba(255,255,255,.05); margin-bottom: 16px; }
    .herb-description {
      font-size: 13px; color: #8a9a8a; line-height: 1.7;
      margin-bottom: 16px; font-weight: 300;
    }
    .detail-section { margin-bottom: 16px; }
    .detail-title {
      font-size: 10px; font-weight: 500;
      letter-spacing: .15em; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .detail-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .detail-list li {
      font-size: 13px; color: #8a9a8a;
      line-height: 1.5; display: flex;
      align-items: flex-start; font-weight: 300;
    }
    .detail-list li .bullet { margin-right: 8px; flex-shrink: 0; }
    .pill-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .info-pill {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 8px; padding: 8px 12px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .info-pill-label {
      font-size: 9px; color: #3a5a3a;
      letter-spacing: .15em; text-transform: uppercase;
    }
    .info-pill-value { font-size: 13px; font-weight: 300; }
    .caution-box {
      background: rgba(200,160,96,.06);
      border-radius: 8px; padding: 10px 14px;
      margin-bottom: 12px;
    }
    .dosage-box {
      background: rgba(255,255,255,.03);
      border-radius: 8px; padding: 10px 14px;
    }
    .dosage-text { font-size: 12px; color: #8a9a8a; line-height: 1.6; }

    /* ── Nervine card ── */
    .nervine-card {
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px; padding: 20px 22px;
      margin-bottom: 32px;
    }
    .nervine-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 400;
      color: #e0e8e0; margin-bottom: 4px;
    }
    .nervine-botanical { font-size: 12px; color: #6a7a6a; font-style: italic; margin-bottom: 10px; }
    .nervine-reason { font-size: 13px; color: #9aaa9a; line-height: 1.6; font-weight: 300; }

    /* ── Disclaimer & restart ── */

      border-top: 1px solid rgba(255,255,255,.05);
      padding-top: 24px; margin-bottom: 32px;
      font-size: 12px; color: #4a5a4a;
      line-height: 1.8; font-weight: 300;
      text-align: center;
    }
    .restart-btn {
      display: block; margin: 0 auto;
      background: none;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 50px; padding: 10px 24px;
      color: #5a7a5a; font-size: 12px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      letter-spacing: .05em; transition: opacity .2s;
    }
    .restart-btn:hover { opacity: .6; }

    /* ── Fade/slide transitions ── */
    .fade-out { opacity: 0 !important; transform: translateY(12px) !important; }
    .stagger-in {
      opacity: 0; transform: translateY(24px);
      animation: staggerIn .5s ease forwards;
    }
    @keyframes staggerIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .q-card { padding: 28px 20px; }
      .q-title { font-size: 20px; }
      .results-title { font-size: 24px; }
    }
  </style>
</head>

// ═══════════════════════════════════════════════════════
// MATCHING ENGINE
// ═══════════════════════════════════════════════════════

function matchHerbs(answers) {
  const { primary_goal, stress_type=[], energy_pattern, sleep_quality,
          constitution, health_conditions=[], lifestyle=[] } = answers;

  const hardExclusions = new Set();
  if (health_conditions.includes("pregnant")) {
    hardExclusions.add("rhodiola"); hardExclusions.add("asian_ginseng");
  }
  if (health_conditions.includes("heart")) hardExclusions.add("asian_ginseng");

  const scored = HERBS
    .filter(h => !hardExclusions.has(h.id))
    .map(herb => {
      let score = 0;
      const flags = [];

      if (herb.scores[primary_goal]) score += herb.scores[primary_goal] * 3;
      if (constitution && herb.constitutionFit[constitution] !== undefined)
        score += herb.constitutionFit[constitution] * 2.5;
      stress_type.forEach(st => { if (herb.stressType?.[st]) score += herb.stressType[st] * 1.5; });
      if (sleep_quality && herb.sleep?.[sleep_quality]) score += herb.sleep[sleep_quality] * 1.5;
      lifestyle.forEach(l => { if (herb.lifestyle?.[l]) score += herb.lifestyle[l]; });

      if (energy_pattern === "evening_wired" || energy_pattern === "inconsistent") {
        if (herb.stimulation === "calming") score += 2;
        if (herb.stimulation === "stimulating") score -= 1;
      }
      if (energy_pattern === "low_all_day" || energy_pattern === "morning_crash") {
        if (herb.stimulation === "stimulating" || herb.stimulation === "moderate") score += 1.5;
      }
      if (health_conditions.includes("medications") &&
          herb.drugWarnings?.length > 0 && herb.drugWarnings[0] !== "No known interactions" &&
          !herb.drugWarnings[0].includes("No significant"))
        flags.push("drug_interaction_check");
      if (health_conditions.includes("thyroid") && herb.id === "ashwagandha")
        flags.push("thyroid_caution");

      return { ...herb, score: Math.max(0, score), flags };
    })
    .sort((a, b) => b.score - a.score);

  const primary = scored.slice(0, 3);

  let nervine = null;
  if (stress_type.includes("anxiety") && sleep_quality === "cant_fall_asleep")
    nervine = { name:"Passionflower", botanical:"Passiflora incarnata", reason:"For the mind that will not stop at night — circular thoughts preventing sleep." };
  else if (stress_type.includes("anxiety") || stress_type.includes("irritability"))
    nervine = { name:"Motherwort + Blue Vervain", botanical:"Leonurus cardiaca · Verbena hastata", reason:"Winston's classic pairing for anxiety and irritability — calms without sedating." };
  else if (stress_type.includes("mental_fog") || stress_type.includes("withdrawal"))
    nervine = { name:"Fresh Milky Oat", botanical:"Avena sativa", reason:"The greatest nervous system trophorestorative — for shattered nerves and burnout." };
  else if (sleep_quality === "wake_night" && lifestyle.includes("menopause"))
    nervine = { name:"Motherwort + Passionflower + Hops", botanical:"Leonurus · Passiflora · Humulus", reason:"Winston's formula for menopausal insomnia — falls asleep fine, but wakes at 1–3am." };

  const hasDrugWarning = health_conditions.includes("medications") &&
    primary.some(h => h.flags.includes("drug_interaction_check"));

  return { primary, nervine, hasDrugWarning };
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

let state = {
  screen: "questionnaire", // questionnaire | results
  current: 0,
  answers: {},
  textInput: "",
  openCards: new Set(),
};

function setState(patch) {
  state = { ...state, ...patch };
  render();
}

// ═══════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════

function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") node.className = v;
      else if (k === "style" && typeof v === "object") Object.assign(node.style, v);
      else if (k.startsWith("on")) node.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "disabled") { if (v) node.disabled = true; }
      else node.setAttribute(k, v);
    }
  }
  children.flat(Infinity).forEach(c => {
    if (c == null) return;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return node;
}

function div(attrs, ...children) { return el("div", attrs, ...children); }
function span(attrs, ...children) { return el("span", attrs, ...children); }
function btn(attrs, ...children) { return el("button", attrs, ...children); }
function p(attrs, ...children) { return el("p", attrs, ...children); }
function h(n, attrs, ...children) { return el("h"+n, attrs, ...children); }
function ul(attrs, ...children) { return el("ul", attrs, ...children); }
function li(attrs, ...children) { return el("li", attrs, ...children); }

// ═══════════════════════════════════════════════════════
// QUESTIONNAIRE
// ═══════════════════════════════════════════════════════

function renderQuestionnaire() {
  const q = QUESTIONS[state.current];
  const accent = CATEGORY_COLOURS[q.category] || "#a8c5a0";
  const progress = (state.current / QUESTIONS.length) * 100;

  document.getElementById("progress-fill").style.width = progress + "%";
  document.getElementById("progress-fill").style.backgroundColor = accent;
  document.getElementById("step-counter").textContent = `${state.current + 1} / ${QUESTIONS.length}`;

  const canProceed = () => {
    if (q.type === "text") return state.textInput.trim().length > 0;
    if (q.type === "single") return state.answers[q.id] !== undefined;
    if (q.type === "multi") return (state.answers[q.id]||[]).length > 0;
    return false;
  };

  const doTransition = (fn) => {
    const card = document.querySelector(".q-card");
    const nav = document.querySelector(".nav");
    if (card) card.classList.add("fade-out");
    if (nav) nav.classList.add("fade-out");
    setTimeout(() => { fn(); render(); }, 320);
  };

  const next = () => {
    if (!canProceed()) return;
    if (q.type === "text") setState({ answers: { ...state.answers, [q.id]: state.textInput } });
    if (state.current === QUESTIONS.length - 1) {
      const finalAnswers = q.type === "text"
        ? { ...state.answers, [q.id]: state.textInput }
        : state.answers;
      doTransition(() => { state = { ...state, screen:"results", answers: finalAnswers }; });
    } else {
      doTransition(() => { state = { ...state, current: state.current + 1 }; });
    }
  };

  const back = () => {
    if (state.current === 0) return;
    doTransition(() => { state = { ...state, current: state.current - 1 }; });
  };

  // Build option list
  let optionsEl = null;
  if (q.type === "text") {
    const input = el("input", {
      class: "text-input",
      type: "text",
      placeholder: q.placeholder,
      value: state.textInput,
      style: { borderColor: state.textInput ? accent : "#2e3e2e" },
      onInput: e => { state.textInput = e.target.value; document.querySelector(".next-btn").disabled = !e.target.value.trim(); document.querySelector(".text-input").style.borderColor = e.target.value ? accent : "#2e3e2e"; },
      onKeydown: e => { if (e.key === "Enter" && canProceed()) next(); },
    });
    optionsEl = div({}, input);
    setTimeout(() => { const i = document.querySelector(".text-input"); if(i) i.focus(); }, 50);
  }

  if (q.type === "single") {
    optionsEl = div({class:"opt-list"});
    q.options.forEach(o => {
      const selected = state.answers[q.id] === o.value;
      const b = btn({
        class: "opt-btn" + (selected?" selected":""),
        style: { "--ac": accent },
        onClick: () => {
          state.answers = { ...state.answers, [q.id]: o.value };
          render();
        }
      });
      if (o.icon) b.appendChild(span({class:"opt-icon", style:{color:accent}}, o.icon));
      b.appendChild(span({}, o.label));
      optionsEl.appendChild(b);
    });
  }

  if (q.type === "multi") {
    optionsEl = div({class:"opt-list"});
    q.options.forEach(o => {
      const cur = state.answers[q.id] || [];
      const selected = cur.includes(o.value);
      const b = btn({
        class: "opt-btn" + (selected?" selected":""),
        style: { "--ac": accent },
        onClick: () => {
          let cur2 = state.answers[q.id] || [];
          if (o.value === "none") { state.answers = { ...state.answers, [q.id]: ["none"] }; }
          else {
            const filtered = cur2.filter(x => x !== "none");
            state.answers = { ...state.answers, [q.id]: filtered.includes(o.value) ? filtered.filter(x=>x!==o.value) : [...filtered, o.value] };
          }
          render();
        }
      });
      const cb = div({class:"checkbox"+(selected?" checked":""), style: selected?{borderColor:accent,background:accent}:{borderColor:"#2e3e2e"}});
      b.appendChild(cb);
      b.appendChild(span({}, o.label));
      optionsEl.appendChild(b);
    });
  }

  const card = div({class:"q-card"});
  const catEl = div({class:"q-category", style:{color:accent}}, q.category);
  const title = h(2,{class:"q-title"}, q.question);
  card.appendChild(catEl);
  card.appendChild(title);
  if (q.subtitle) card.appendChild(p({class:"q-sub"}, q.subtitle));
  if (optionsEl) card.appendChild(optionsEl);

  const navEl = div({class:"nav"});
  if (state.current > 0) navEl.appendChild(btn({class:"back-btn", onClick:back}, "← Back"));
  const nextB = btn({
    class:"next-btn",
    style:{background:accent, marginLeft: state.current===0?"auto":""},
    disabled: !canProceed(),
    onClick: next,
  }, state.current === QUESTIONS.length-1 ? "Reveal my profile →" : "Continue →");
  navEl.appendChild(nextB);

  const screen = div({class:"screen"});
  screen.appendChild(card);
  screen.appendChild(navEl);
  return screen;
}

// ═══════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════

function renderHerbCard(herb, rank) {
  const rankLabels = ["Primary","Secondary","Supporting"];
  const catLabels = { well_researched:"Well-researched", probable:"Probable adaptogen", possible:"Possible adaptogen" };
  const stimLabels = { calming:"Calming", mild:"Mild", moderate:"Moderate", stimulating:"Stimulating" };
  const isOpen = state.openCards.has(herb.id);

  const card = div({
    class: "herb-card" + (isOpen?" open":""),
    style: { "--herb-colour": herb.colour }
  });

  // Header
  const header = div({class:"herb-card-header", onClick:() => {
    const nc = new Set(state.openCards);
    if (nc.has(herb.id)) nc.delete(herb.id); else nc.add(herb.id);
    state.openCards = nc; render();
  }});

  const sym = div({class:"herb-symbol"}, herb.symbol);
  const meta = div({class:"herb-meta"});
  const badges = div({class:"herb-badges"});

  const rankBadge = span({class:"rank-badge", style:{background:herb.colour+"22",color:herb.colour}}, rankLabels[rank]);
  const catBadge = span({class:"cat-badge"}, catLabels[herb.category]);
  badges.appendChild(rankBadge); badges.appendChild(catBadge);
  meta.appendChild(badges);
  meta.appendChild(h(3,{class:"herb-name"}, herb.name));
  meta.appendChild(p({class:"herb-botanical"}, herb.botanical));
  meta.appendChild(p({class:"herb-tagline"}, herb.tagline));

  const chev = span({class:"herb-chevron"}, "▾");
  header.appendChild(sym); header.appendChild(meta); header.appendChild(chev);
  card.appendChild(header);

  // Expanded
  if (isOpen) {
    const exp = div({class:"herb-expanded"});
    exp.appendChild(div({class:"herb-divider"}));
    exp.appendChild(p({class:"herb-description"}, herb.description));

    // Best for
    const bestSec = div({class:"detail-section"});
    bestSec.appendChild(p({class:"detail-title",style:{color:herb.colour}}, "Best for"));
    const bestList = ul({class:"detail-list"});
    herb.bestFor.forEach(b => {
      const item = li({});
      item.appendChild(span({class:"bullet",style:{color:herb.colour}}, "◦"));
      item.appendChild(document.createTextNode(b));
      bestList.appendChild(item);
    });
    bestSec.appendChild(bestList);
    exp.appendChild(bestSec);

    // Pills
    const pillRow = div({class:"pill-row"});
    const p1 = div({class:"info-pill"});
    p1.appendChild(span({class:"info-pill-label"}, "Stimulation"));
    p1.appendChild(span({class:"info-pill-value",style:{color:herb.colour}}, stimLabels[herb.stimulation]||herb.stimulation));
    const p2 = div({class:"info-pill"});
    p2.appendChild(span({class:"info-pill-label"}, "Temperature"));
    p2.appendChild(span({class:"info-pill-value",style:{color:herb.colour}}, herb.temperature.charAt(0).toUpperCase()+herb.temperature.slice(1)));
    pillRow.appendChild(p1); pillRow.appendChild(p2);
    exp.appendChild(pillRow);

    // Cautions
    const realCautions = herb.cautions?.filter(c => c !== "None likely at normal doses");
    if (realCautions?.length > 0) {
      const cautSec = div({class:"detail-section caution-box"});
      cautSec.appendChild(p({class:"detail-title",style:{color:"#c8a060"}}, "Cautions"));
      const cautList = ul({class:"detail-list"});
      realCautions.forEach(c => {
        const item = li({});
        item.appendChild(span({class:"bullet",style:{color:"#c8a060"}}, "⚠"));
        item.appendChild(document.createTextNode(c));
        cautList.appendChild(item);
      });
      cautSec.appendChild(cautList);
      exp.appendChild(cautSec);
    }

    // Drug warnings
    const realDrugs = herb.drugWarnings?.filter(d => d !== "No known interactions" && !d.includes("No significant"));
    if (realDrugs?.length > 0) {
      const drugSec = div({class:"detail-section caution-box"});
      drugSec.appendChild(p({class:"detail-title",style:{color:"#c8a060",marginBottom:"6px"}}, "Drug interactions to check"));
      realDrugs.forEach(d => drugSec.appendChild(p({style:{fontSize:"12px",color:"#8a9a8a",lineHeight:"1.6",fontWeight:"300"}}, d)));
      exp.appendChild(drugSec);
    }

    // Dosage
    const doseSec = div({class:"dosage-box"});
    doseSec.appendChild(p({class:"detail-title",style:{color:"#7a9a7a",marginBottom:"4px"}}, "Suggested dosage"));
    doseSec.appendChild(p({class:"dosage-text"}, herb.dosage));
    exp.appendChild(doseSec);

    card.appendChild(exp);
  }

  return card;
}

function renderResults() {
  document.getElementById("progress-fill").style.width = "100%";
  document.getElementById("step-counter").textContent = "";

  const { primary, nervine, hasDrugWarning } = matchHerbs(state.answers);
  const name = state.answers.name || "";

  const wrap = div({class:"results-wrap"});

  // Header
  const header = div({class:"results-header"});
  header.appendChild(div({class:"results-ornament"}, "✦ ◈ ✦"));
  header.appendChild(h(1,{class:"results-title"}, name ? `Your profile, ${name}` : "Your adaptogen profile"));
  header.appendChild(p({class:"results-sub"}, "Based on your responses and David Winston's clinical herbal framework, these are the adaptogens most aligned with your constitution and current needs."));
  wrap.appendChild(header);

  // Drug warning
  if (hasDrugWarning) {
    const w = div({class:"drug-warning"});
    w.innerHTML = "<strong>Important:</strong> You mentioned taking pharmaceutical medications. Please review the drug interactions listed in each herb card below, and consult a qualified herbalist or your prescribing physician before use.";
    wrap.appendChild(w);
  }

  // Herb cards
  wrap.appendChild(p({class:"section-label"}, "Your recommended adaptogens"));
  const cardsWrap = div({style:{marginBottom:"32px"}});
  primary.forEach((herb, i) => {
    const card = renderHerbCard(herb, i);
    card.classList.add("stagger-in");
    card.style.animationDelay = (i * 150) + "ms";
    cardsWrap.appendChild(card);
  });
  wrap.appendChild(cardsWrap);

  // Nervine
  if (nervine) {
    const nCard = div({class:"nervine-card stagger-in", style:{animationDelay:"500ms"}});
    nCard.appendChild(p({class:"section-label",style:{marginBottom:"12px"}}, "Nervine to combine with"));
    nCard.appendChild(h(4,{class:"nervine-name"}, nervine.name));
    nCard.appendChild(p({class:"nervine-botanical"}, nervine.botanical));
    nCard.appendChild(p({class:"nervine-reason"}, nervine.reason));
    wrap.appendChild(nCard);
  }

  // Disclaimer
  const disc = div({class:"disclaimer stagger-in",style:{animationDelay:"650ms"}});
  disc.innerHTML = "These suggestions are based on David Winston's <em>Adaptogens</em> and are for educational purposes only. They are not a substitute for professional medical advice. Please consult a qualified herbalist or healthcare practitioner before beginning any herbal protocol.";
  wrap.appendChild(disc);

  // Restart
  const restartBtn = btn({class:"restart-btn stagger-in",style:{animationDelay:"700ms"},onClick:()=>{
    state = { screen:"questionnaire", current:0, answers:{}, textInput:"", openCards:new Set() };
    render();
  }}, "Start again");
  wrap.appendChild(restartBtn);

  const screen = div({class:"screen",style:{justifyContent:"flex-start"}});
  screen.appendChild(wrap);
  return screen;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (state.screen === "questionnaire") {
    app.appendChild(renderQuestionnaire());
  } else {
    app.appendChild(renderResults());
  }
}

render();
</script>
